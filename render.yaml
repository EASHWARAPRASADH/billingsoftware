# Render.com Deployment Configuration

services:
  - type: web
    name: billmanagement-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: billmanagement
      - key: DB_PORT
        value: 3306
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false

# Instructions:
# 1. Create a new Web Service on Render.com
# 2. Connect your GitHub repository
# 3. Set Root Directory to: backend
# 4. Use this file or manually configure the settings above
# 5. Add the environment variables in Render dashboard
# 6. Deploy!
