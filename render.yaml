# Render.com Deployment Configuration (Consolidated)
services:
  - type: web
    name: billingsoftware
    env: node
    region: oregon
    plan: free
    # Build command: Installs all dependencies and builds the frontend
    buildCommand: npm run build
    # Start command: Runs the backend server (which also serves the frontend)
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_DIALECT
        value: postgres
      # This links the database created below to the web service
      - key: DATABASE_URL
        fromDatabase:
          name: billingsoftware-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://billingsoftware-o1d9.onrender.com

databases:
  - name: billingsoftware-db
    plan: free
    region: oregon

# Instructions for Render Dashboard:
# 1. Connect your GitHub repository.
# 2. Render will detect this render.yaml.
# 3. Choose the "billingsoftware" blueprint.
# 4. Once live, your database tables will be created automatically by Sequelize.
